<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Свяжитесь с нами | Sedan</title>
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2.2rem 1.8rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .title {
            margin-bottom: 2rem;
        }

        .title h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e2a3a;
            letter-spacing: -0.3px;
        }

        .title p {
            color: #5b6e8c;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .btn i {
            font-size: 1.4rem;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.2);
        }

        .btn:hover i {
            transform: scale(1.05);
        }

        .btn-wa {
            background: #25D366;
            border-color: #20b359;
            color: white;
        }
        .btn-wa i {
            color: white;
        }
        .btn-wa:hover {
            background: #20b359;
        }

        .btn-tg {
            background: #26A5E4;
            border-color: #1e8bc6;
            color: white;
        }
        .btn-tg:hover {
            background: #1f93cf;
        }

        .btn-max {
            background: #4a6272;
            border-color: #3a4e5e;
            color: white;
        }
        .btn-max:hover {
            background: #3a5568;
        }

        .btn-price {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }
        .btn-price i {
            color: #4b6b8f;
        }
        .btn-price:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .btn-catalog {
            background: #2c3e4e;
            border-color: #1f2f3b;
            color: white;
        }
        .btn-catalog:hover {
            background: #1f2f3b;
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #7e8b9e;
            border-top: 1px solid #e9edf2;
            padding-top: 1.2rem;
        }

        .footer-note a {
            color: #2c3e4e;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.5rem;
            }
            .title h1 {
                font-size: 1.6rem;
            }
            .btn {
                padding: 0.8rem 1.2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">
            <h1>Свяжитесь с нами</h1>
            <p>Выберите удобный способ</p>
        </div>

        <div class="buttons">
            <a href="https://wa.me/79060650654" class="btn btn-wa" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://t.me/+79060650654" class="btn btn-tg" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram"></i> Telegram
            </a>
            <a href="tel:+79060650654" class="btn btn-max">
                <i class="fas fa-phone-alt"></i> Макс (менеджер)
            </a>
            <a href="mailto:sales@sedanfilter.ru?subject=Запрос%20прайс-листа&body=Здравствуйте!%20Прошу%20выслать%20актуальный%20прайс-лист." 
               class="btn btn-price">
                <i class="fas fa-file-invoice-dollar"></i> Запросить прайс
            </a>
            <a href="https://sedanfilter.ru/netcat_files/c/Katalog_2026.pdf" class="btn btn-catalog" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-download"></i> Скачать каталог
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-envelope"></i> sales@sedanfilter.ru &nbsp;|&nbsp; 
            <i class="fas fa-phone-alt"></i> +7 (906) 065-06-54
        </div>
    </div>
</body>
</html>
